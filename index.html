<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Day Food Counter Evaluation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 25px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        button { background: #3498db; color: white; border: none; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #3498db; color: white; }
        .rank-top { background: #fff9c4; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Open Day - Food Counter Evaluation </h2>
            <form id="evalForm">
                <label>Name of the Evaluator:</label>
                <input type="text" name="evaluatorName" placeholder="Your Full Name" required>
                
                <label>Counter Number:</label>
                <input type="text" name="counterNum" placeholder="e.g. 05" required>

                <div class="score-grid">
                    <div>
                        <p><strong>a.Hygiene & Cleanliness(1:Strongly disagree,5:Strongly agree)</strong></p>
                        <input type="number" name="h1" placeholder="wearing gloves" min="1" max="5" required>
                        <input type="number" name="h2" placeholder="clean" min="1" max="5" required>
                        <input type="number" name="h3" placeholder="Arrangements" min="1" max="5" required>
                    </div>
                    <div>
                        <p><strong>b.Service & Staff Behaviour(1:Strongly disagree,5:Strongly agree)</strong></p>
                        <input type="number" name="s1" placeholder="Attentive" min="1" max="5" required>
                        <input type="number" name="s2" placeholder="Attitude" min="1" max="5" required>
                        <input type="number" name="s3" placeholder="Available" min="1" max="5" required>
                    </div>
                </div>

                <label>Remarks:</label>
                <textarea name="remarks" placeholder="Optional comments..."></textarea>
                
                <button type="submit" id="submitBtn">Submit Evaluation</button>
            </form>
        </div>

        <div class="card">
            <h2>🏆 Result Sheet (Rankings)</h2>
            <table id="rankTable">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Counter</th>
                        <th>Evaluator</th>
                        <th>Total Score</th>
                        <th>Remarks</th>
                    </tr>
                </thead>
                <tbody id="rankBody">
                    <tr><td colspan="5" style="text-align:center;">Loading rankings...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyg4Qzklzr8ZJtoJT_b0pvb6h_yNWBSaNmjAfIH_y4_7aOS-u2OEa70ME4ew98RC5hUEA/exec";

        document.getElementById('evalForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Submitting...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            }).then(() => {
                alert("Evaluation submitted successfully!");
                this.reset();
                btn.disabled = false;
                btn.innerText = "Submit Evaluation";
                loadRankings();
            }).catch(err => alert("Error submitting data."));
        });

        async function loadRankings() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                const body = document.getElementById('rankBody');
                body.innerHTML = data.map((row, i) => `
                    <tr class="${i === 0 ? 'rank-top' : ''}">
                        <td>${i + 1}</td>
                        <td>${row.counter}</td>
                        <td>${row.evaluator}</td>
                        <td><strong>${row.total}</strong></td>
                        <td>${row.remarks || '-'}</td>
                    </tr>
                `).join('') || '<tr><td colspan="5" style="text-align:center;">No data yet.</td></tr>';
            } catch (e) {
                console.error("Error loading rankings.");
            }
        }

        window.onload = loadRankings;
    </script>
</body>
</html>
