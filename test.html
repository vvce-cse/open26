<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration for Open Day 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-logo {
            max-width: 150px;
            height: auto;
            margin: 0 auto 15px;
            display: block;
            border-radius: 8px;
        }

        .form-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .required {
            color: #e74c3c;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .radio-option label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .reset-btn {
            background: #f0f0f0;
            color: #333;
        }

        .reset-btn:hover {
            background: #e0e0e0;
        }

        .analytics-link {
            text-align: center;
            margin-top: 20px;
        }

        .analytics-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .analytics-link a:hover {
            text-decoration: underline;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-header">
            <img src="images.jpg" alt="College Logo" class="form-logo">
            <h1>Registration for Open Day</h1>
            <p>Vidyavardhaka College of Engineering - 2026</p>
        </div>

        <div class="success-message" id="successMessage">
            ✓ Registration submitted successfully!
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Submitting...</p>
        </div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="studentName">Student Name <span class="required">*</span></label>
                <input type="text" id="studentName" name="studentName" required>
            </div>

            <div class="form-group">
                <label for="collegeName">Name of the PU College <span class="required">*</span></label>
                <input type="text" id="collegeName" name="collegeName" required>
            </div>

            <div class="form-group">
                <label for="phoneNumber">Phone Number <span class="required">*</span></label>
                <input type="tel" id="phoneNumber" name="phoneNumber" required>
            </div>

            <div class="form-group">
                <label for="emailId">E-mail ID <span class="required">*</span></label>
                <input type="email" id="emailId" name="emailId" required>
            </div>

            <div class="form-group">
                <label for="nativePlace">Your Native Place <span class="required">*</span></label>
                <input type="text" id="nativePlace" name="nativePlace" required>
            </div>

            <div class="form-group">
                <label>Are you interested in joining Engineering? <span class="required">*</span></label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="interestYes" name="interest" value="Yes" required>
                        <label for="interestYes">Yes</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="interestNo" name="interest" value="No" required>
                        <label for="interestNo">No</label>
                    </div>
                </div>
            </div>

            <div class="form-group" id="branchGroup">
                <label for="branch">Which Engineering branch are you interested in? <span class="required">*</span></label>
                <select id="branch" name="branch" required>
                    <option value="">Select a branch</option>
                    <option value="Department of Computer Science & Engineering">Computer Science & Engineering</option>
                    <option value="Department of Computer Science & Engineering (AI & ML)">Computer Science & Engineering (AI & ML)</option>
                    <option value="Department of Electronics & Communication Engineering">Electronics & Communication Engineering</option>
                    <option value="Department of Electrical & Electronics Engineering">Electrical & Electronics Engineering</option>
                    <option value="Department of Mechanical Engineering">Mechanical Engineering</option>
                    <option value="Department of Civil Engineering">Civil Engineering</option>
                </select>
            </div>

            <div class="form-group">
                <label for="totalMembers">Total members attending the Open Day <span class="required">*</span></label>
                <input type="number" id="totalMembers" name="totalMembers" min="1" required>
            </div>

            <div class="button-group">
                <button type="submit" class="submit-btn">Submit</button>
                <button type="reset" class="reset-btn">Clear Form</button>
            </div>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAmPxX7wAXj9Bqsvvqbh4TjpKd13kKoo6E",
            authDomain: "registration-form-2026-ff87e.firebaseapp.com",
            projectId: "registration-form-2026-ff87e",
            storageBucket: "registration-form-2026-ff87e.firebasestorage.app",
            messagingSenderId: "145051137275",
            appId: "1:145051137275:web:6355186ce25091f8e22c5e",
            measurementId: "G-G7GV2S28DJ"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();
    </script>

    <script>
        // Form submission
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

            loading.classList.add('show');
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';

            try {
                const formData = {
                    email: document.getElementById('email').value,
                    studentName: document.getElementById('studentName').value,
                    collegeName: document.getElementById('collegeName').value,
                    phoneNumber: document.getElementById('phoneNumber').value,
                    emailId: document.getElementById('emailId').value,
                    nativePlace: document.getElementById('nativePlace').value,
                    interest: document.querySelector('input[name="interest"]:checked')?.value || '',
                    branch: document.getElementById('branch').value || '',
                    totalMembers: parseInt(document.getElementById('totalMembers').value),
                    timestamp: new Date(),
                    submittedAt: new Date().toLocaleString()
                };

                // Add document to Firestore
                const docRef = await db.collection('registrations').add(formData);
                
                loading.classList.remove('show');
                successMessage.style.display = 'block';
                
                // Reset form
                document.getElementById('registrationForm').reset();

                // Scroll to success message
                successMessage.scrollIntoView({ behavior: 'smooth' });

                // Hide message after 5 seconds
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 5000);

            } catch (error) {
                console.error('Error submitting form:', error);
                loading.classList.remove('show');
                errorMessage.textContent = 'Error submitting form: ' + error.message;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
